/* ============================================================
   Galih Adityas Architecture — Design Tokens
   Source: Architectural Portfolio HTML (galihadityas/gap)
   Aesthetic: Warm minimalist, off-white canvas, monochrome restraint
   ============================================================ */

/* ---------- Webfonts (DM Sans variable, vendored locally) ---------- */



:root {
  /* ---------- Color: Base canvas (warm off-white) ---------- */
  --bg:           hsl(35, 20%, 97%);   /* #F8F5EF — warm bone, primary canvas */
  --bg-elevated:  hsl(35, 20%, 99%);   /* near-white surface, modal bg */
  --secondary:    hsl(30,  8%, 88%);   /* #E2DEDA — section banding, badge bg */
  --muted:        hsl(30, 12%, 92%);   /* #ECE7E1 — placeholder/skeleton bg */
  --border:       hsl(30, 15%, 85%);   /* #DAD3CB — hairline rule, divider */

  /* ---------- Color: Foreground (cool ink, never pure black) ---------- */
  --fg:           hsl(220, 15%, 15%);  /* #20242E — body ink */
  --fg-soft:      hsla(220, 15%, 15%, 0.9);
  --fg-mute:      hsla(220, 15%, 15%, 0.8);
  --fg-quiet:     hsla(220, 15%, 15%, 0.75);
  --muted-fg:     hsl(220, 10%, 45%);  /* #6B6F78 — secondary text, nav, meta */

  /* ---------- Color: Overlays ---------- */
  --overlay-image:    rgba(0, 0, 0, 0.4);   /* card hover dim */
  --overlay-modal:    rgba(0, 0, 0, 0.6);   /* modal backdrop */
  --header-scrolled:  hsla(35, 20%, 97%, 0.95);
  --bg-onimg-strong:  rgba(255, 255, 255, 1.0);
  --bg-onimg-soft:    rgba(255, 255, 255, 0.7);
  --bg-onimg-quiet:   rgba(255, 255, 255, 0.6);

  /* ---------- Type: families ---------- */
  --font-sans:    'DM Sans', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  --font-mono:    ui-monospace, 'SF Mono', Menlo, Consolas, monospace;

  /* ---------- Type: weights (DM Sans is variable 100–1000) ---------- */
  --w-light:    300;   /* body, card titles — the signature weight */
  --w-normal:   400;
  --w-medium:   500;   /* nav, eyebrows, footer labels */
  --w-semibold: 600;   /* footer headings */
  --w-bold:     700;   /* awards heading, modal title, footer brand */

  /* ---------- Type: sizes (px scale) ---------- */
  --t-eyebrow:    11px;   /* card category */
  --t-micro:      12px;   /* footer column heading, badge */
  --t-meta:       13px;   /* nav, meta, footer links, card location */
  --t-body-sm:    14px;   /* footer text, awards, modal meta */
  --t-body:       15px;   /* body default, mobile nav */
  --t-lead:       16px;   /* modal description, lead paragraph */
  --t-h4:         18px;   /* footer brand, card title (mobile) */
  --t-h3:         22px;   /* card title (desktop) */
  --t-h2:         28px;   /* sub-section heading (large card) */
  --t-h1:         36px;   /* modal title cap */
  --t-display:    72px;   /* hero/display, used sparingly */

  /* ---------- Type: line height ---------- */
  --lh-tight:    1.2;     /* modal title */
  --lh-snug:     1.3;     /* card title */
  --lh-normal:   1.6;     /* body */
  --lh-relaxed:  1.7;     /* footer body, lists */
  --lh-loose:    1.85;    /* about / long prose */

  /* ---------- Type: tracking (letter-spacing) ---------- */
  --tr-cap-sm:   0.08em;  /* nav, awards heading, footer brand */
  --tr-cap-lg:   0.10em;  /* eyebrow, footer column heading */
  --tr-display: -0.01em;  /* large titles, slight negative */

  /* ---------- Spacing (rem-based; matches container scale) ---------- */
  --s-1:  0.25rem;   /* 4px  — tight inline gap */
  --s-2:  0.5rem;    /* 8px  — small icon gap */
  --s-3:  0.75rem;   /* 12px — chip padding */
  --s-4:  1rem;      /* 16px — list rhythm */
  --s-5:  1.25rem;   /* 20px — paragraph spacing */
  --s-6:  1.5rem;    /* 24px — card grid gap, padding */
  --s-7:  2rem;      /* 32px — header padding, nav gap */
  --s-8:  2.5rem;    /* 40px — about row gap (mobile) */
  --s-10: 3rem;      /* 48px — large gap, section pad */
  --s-12: 4rem;      /* 64px — about row gap (desktop) */
  --s-16: 5rem;      /* 80px — about row gap (wide), footer pad */
  --s-20: 6rem;      /* 96px — section pad */

  /* ---------- Layout ---------- */
  --container-max:  1600px;
  --container-pad:  2rem;     /* desktop */
  --container-pad-md: 1.5rem;
  --container-pad-sm: 1rem;
  --header-h:       72px;

  /* ---------- Borders & Radii (no rounding — strict orthogonal) ---------- */
  --radius-none: 0;
  --radius-pill: 9999px;     /* used only for icon buttons (modal close) */
  --rule:        1px solid var(--border);

  /* ---------- Shadows (used very rarely; system is mostly flat) ---------- */
  --shadow-rule:  0 1px 0 var(--border);   /* sticky header bottom rule */
  --shadow-modal: 0 30px 80px -20px rgba(0, 0, 0, 0.35);

  /* ---------- Motion ---------- */
  --hover-duration: 400ms;
  --easing-out:     cubic-bezier(0.16, 1, 0.3, 1);  /* eased-out, calm */
  --easing-image:   ease-out;
  --duration-fast:  200ms;
  --duration-base:  300ms;
  --duration-slow:  400ms;

  /* ---------- Image treatment ---------- */
  --img-zoom:        1.04;             /* hover image scale */
  --aspect-card:     4 / 3;
  --aspect-portrait: 1 / 1;
}

/* ============================================================
   Semantic element styles — opt-in via .ds-prose or root
   ============================================================ */

.ds-prose, .ds-root {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-sans);
  font-size: var(--t-body);
  font-weight: var(--w-light);
  line-height: var(--lh-normal);
}

.ds-prose h1, h1.ds {
  font-size: var(--t-h1);
  font-weight: var(--w-bold);
  line-height: var(--lh-tight);
  letter-spacing: var(--tr-display);
}

.ds-prose h2, h2.ds {
  font-size: var(--t-h2);
  font-weight: var(--w-bold);
  line-height: var(--lh-tight);
  letter-spacing: var(--tr-display);
}

.ds-prose h3, h3.ds {
  font-size: var(--t-h3);
  font-weight: var(--w-light);  /* signature: thin sans titles */
  line-height: var(--lh-snug);
}

.ds-prose h4, h4.ds {
  font-size: var(--t-h4);
  font-weight: var(--w-bold);
  text-transform: uppercase;
  letter-spacing: var(--tr-cap-sm);
}

.ds-prose p, p.ds {
  font-size: var(--t-body);
  line-height: var(--lh-loose);
  color: var(--fg-mute);
  margin-bottom: var(--s-5);
}

.ds-prose strong, strong.ds {
  font-weight: var(--w-semibold);
  color: var(--fg);
}

.ds-prose .eyebrow, .eyebrow.ds {
  font-size: var(--t-eyebrow);
  font-weight: var(--w-medium);
  text-transform: uppercase;
  letter-spacing: var(--tr-cap-lg);
  color: var(--muted-fg);
}

.ds-prose .meta, .meta.ds {
  font-size: var(--t-meta);
  color: var(--muted-fg);
}

.ds-prose code, code.ds {
  font-family: var(--font-mono);
  font-size: 0.9em;
  background: var(--muted);
  padding: 1px 6px;
}


  /* Dark inversion — applied via body.dark to flip canvas tokens to ink */
  body.dark {
    --bg:           hsl(220, 12%, 8%);
    --bg-elevated:  hsl(220, 12%, 11%);
    --secondary:    hsl(220, 10%, 14%);
    --muted:        hsl(220, 10%, 12%);
    --border:       hsl(220, 8%, 22%);
    --fg:           hsl(35, 18%, 94%);
    --fg-soft:      hsla(35, 18%, 94%, 0.92);
    --fg-mute:      hsla(35, 18%, 94%, 0.78);
    --fg-quiet:     hsla(35, 18%, 94%, 0.65);
    --muted-fg:     hsl(35, 8%, 62%);
    --header-scrolled: hsla(220, 12%, 8%, 0.92);
    --shadow-rule:  0 1px 0 var(--border);
  }
  body.dark .logo img { filter: invert(1); }
  body.dark .modal-close { background: hsla(220, 12%, 14%, 0.9); }
  body.dark .modal-close:hover { background: var(--bg-elevated); }
  body.dark .modal-close svg { stroke: var(--fg); }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--fg); font-family: var(--font-sans); font-weight: var(--w-light); font-size: var(--t-body); line-height: var(--lh-normal); overflow-x: hidden; }

  /* HEADER */
  .site-header { position: sticky; top: 0; z-index: 50; width: 100%; transition: background 0.3s, box-shadow 0.3s; }
  .site-header.scrolled { background: var(--header-scrolled); backdrop-filter: blur(12px); box-shadow: var(--shadow-rule); }
  .header-inner { max-width: var(--container-max); margin: 0 auto; padding: 0 var(--container-pad); display: flex; align-items: center; justify-content: space-between; height: var(--header-h); }
  .logo img { height: 45px; width: auto; display: block; }
  nav { display: flex; gap: var(--s-7); }
  nav a { font-size: var(--t-meta); font-weight: var(--w-medium); text-transform: uppercase; letter-spacing: var(--tr-cap-sm); color: var(--muted-fg); text-decoration: none; transition: color var(--duration-fast); }
  nav a:hover { color: var(--fg); }
  .menu-btn { display: none; background: none; border: none; cursor: pointer; padding: 6px; color: var(--fg); }
  .mobile-nav { display: flex; flex-direction: column; background: var(--bg); border-top: var(--rule); padding: 0 var(--container-pad); }
  .mobile-nav a { font-size: var(--t-body); font-weight: var(--w-medium); text-transform: uppercase; letter-spacing: var(--tr-cap-sm); color: var(--fg); text-decoration: none; padding: 16px 0; border-bottom: var(--rule); }
  @media (max-width: 768px) { nav { display: none; } .menu-btn { display: block; } }

  /* LAYOUT */
  .container { max-width: var(--container-max); margin: 0 auto; padding: 0 var(--container-pad-sm); }
  @media (min-width: 640px)  { .container { padding: 0 var(--container-pad-md); } }
  @media (min-width: 1024px) { .container { padding: 0 var(--container-pad); } }
  .section-work { padding: var(--s-7) 0 var(--s-20); }

  /* GRID */
  .uniform-grid { display: grid; gap: var(--s-6); grid-template-columns: 1fr; }
  @media (min-width: 640px)  { .uniform-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 1024px) { .uniform-grid { grid-template-columns: repeat(3, 1fr); } }

  /* CARD */
  .project-card { position: relative; overflow: hidden; background: var(--muted); cursor: pointer; }
  .card-ratio { position: relative; overflow: hidden; aspect-ratio: var(--aspect-card); }
  .card-ratio img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform var(--hover-duration) var(--easing-image); }
  .project-card:hover .card-ratio img { transform: scale(var(--img-zoom)); }
  .card-overlay { position: absolute; inset: 0; background: black; opacity: 0; transition: opacity var(--hover-duration) var(--easing-image); }
  .project-card:hover .card-overlay { opacity: 0.4; }
  .card-text { position: absolute; inset: 0; padding: var(--s-6); display: flex; flex-direction: column; justify-content: flex-end; opacity: 0; transform: translateY(12px); transition: opacity var(--hover-duration) var(--easing-image), transform var(--hover-duration) var(--easing-image); z-index: 10; }
  .project-card:hover .card-text { opacity: 1; transform: translateY(0); }
  .card-cat { color: rgba(255,255,255,0.7); font-size: var(--t-eyebrow); font-weight: var(--w-medium); text-transform: uppercase; letter-spacing: var(--tr-cap-lg); margin-bottom: 6px; }
  .card-title { color: white; font-size: clamp(18px, 2vw, 22px); font-weight: var(--w-light); line-height: var(--lh-snug); }
  .card-loc { color: rgba(255,255,255,0.6); font-size: var(--t-meta); margin-top: 4px; }

  /* ABOUT */
  .section-about { padding: var(--s-20) 0; background: var(--secondary); }
  .about-bio-row { display: grid; grid-template-columns: 1fr; gap: var(--s-8); align-items: start; margin-bottom: var(--s-12); }
  @media (min-width: 768px)  { .about-bio-row { grid-template-columns: 280px 1fr; gap: var(--s-12); } }
  @media (min-width: 1024px) { .about-bio-row { grid-template-columns: 340px 1fr; gap: var(--s-16); } }
  .about-img { overflow: hidden; background: var(--muted); }
  .about-img img { width: 100%; display: block; object-fit: cover; }
  .about-text { font-size: var(--t-body); line-height: var(--lh-loose); color: var(--fg-mute); margin-bottom: var(--s-5); }
  .about-text strong { font-weight: var(--w-semibold); color: var(--fg); }
  .about-awards { border-top: var(--rule); padding-top: var(--s-10); }
  .awards-section { margin-bottom: var(--s-10); }
  .awards-heading { font-size: var(--t-body-sm); font-weight: var(--w-bold); text-transform: uppercase; letter-spacing: var(--tr-cap-sm); margin-bottom: var(--s-5); color: var(--fg); }
  .awards-list { list-style: disc; padding-left: var(--s-5); }
  .awards-list li { font-size: var(--t-body-sm); line-height: var(--lh-relaxed); color: var(--fg-quiet); margin-bottom: var(--s-2); }
  .awards-list a { color: inherit; text-underline-offset: 3px; text-decoration-color: var(--border); transition: color var(--duration-fast), text-decoration-color var(--duration-fast); }
  .awards-list a:hover { color: var(--fg); text-decoration-color: var(--fg); }

  /* FOOTER */
  footer { background: var(--bg); border-top: var(--rule); padding: var(--s-10) 0 var(--s-7); }
  .footer-top { display: flex; flex-direction: column; gap: var(--s-8); padding-bottom: var(--s-7); }
  @media (min-width: 640px) { .footer-top { flex-direction: row; align-items: flex-start; gap: var(--s-16); } }
  .footer-col h3 { font-size: var(--t-micro); font-weight: var(--w-semibold); text-transform: uppercase; letter-spacing: var(--tr-cap-lg); margin-bottom: var(--s-5); color: var(--fg); }
  .inquiries-row { display: flex; flex-direction: column; gap: var(--s-3); }
  .inquiries-row a { display: flex; align-items: center; gap: 10px; font-size: var(--t-body-sm); color: var(--muted-fg); text-decoration: none; transition: color var(--duration-fast); }
  .inquiries-row a:hover { color: var(--fg); }
  .social-row { display: flex; gap: 18px; }
  .social-row a { color: var(--fg); transition: opacity var(--duration-fast); display: inline-flex; }
  .social-row a:hover { opacity: 0.6; }
  .footer-bottom { padding-top: var(--s-6); border-top: var(--rule); font-size: var(--t-meta); color: var(--muted-fg); }
  .footer-bottom p strong { font-weight: var(--w-bold); color: var(--fg); }

  /* MODAL */
  .modal-backdrop { position: fixed; inset: 0; background: var(--overlay-modal); z-index: 200; display: flex; align-items: center; justify-content: center; padding: var(--s-4); opacity: 0; visibility: hidden; transition: opacity var(--duration-base), visibility var(--duration-base); }
  .modal-backdrop.open { opacity: 1; visibility: visible; }
  .modal { background: var(--bg); width: 100%; max-width: 860px; max-height: 90vh; overflow-y: auto; position: relative; transform: translateY(16px); transition: transform var(--duration-base); }
  .modal-backdrop.open .modal { transform: translateY(0); }
  .modal-img { width: 100%; height: 280px; object-fit: cover; display: block; }
  @media (min-width: 768px) { .modal-img { height: 380px; } }
  .modal-close { position: absolute; top: var(--s-4); right: var(--s-4); background: hsla(35,20%,97%,0.9); border: none; border-radius: var(--radius-pill); width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background var(--duration-fast); }
  .modal-close:hover { background: var(--bg); }
  .modal-body { padding: var(--s-6); }
  @media (min-width: 768px) { .modal-body { padding: var(--s-7); } }
  .modal-header { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--s-4); margin-bottom: var(--s-4); }
  .modal-title { font-size: clamp(24px, 4vw, 36px); font-weight: var(--w-bold); line-height: var(--lh-tight); letter-spacing: var(--tr-display); }
  .modal-badge { background: var(--secondary); color: var(--fg); font-size: var(--t-micro); font-weight: var(--w-medium); padding: 4px 12px; white-space: nowrap; flex-shrink: 0; margin-top: 6px; }
  .modal-meta { display: flex; flex-wrap: wrap; gap: var(--s-4); margin-bottom: var(--s-6); font-size: var(--t-body-sm); color: var(--muted-fg); }
  .modal-meta span { display: flex; align-items: center; gap: 6px; }
  .modal-desc { font-size: var(--t-lead); line-height: var(--lh-loose); color: var(--fg-soft); }

  /* EDITOR TOOLBAR */
  .editor-toolbar { position: fixed; top: 12px; right: 12px; z-index: 300; display: flex; gap: 8px; background: var(--bg-elevated); border: var(--rule); padding: 6px; border-radius: 999px; box-shadow: 0 6px 20px rgba(0,0,0,0.25); }
  .editor-toolbar .et-modes, .editor-toolbar .et-actions { display: flex; gap: 4px; }
  .editor-toolbar button { background: transparent; color: var(--fg); border: 0; font-family: var(--font-sans); font-size: var(--t-meta); font-weight: var(--w-medium); text-transform: uppercase; letter-spacing: var(--tr-cap-sm); padding: 6px 12px; border-radius: 999px; cursor: pointer; transition: background var(--duration-fast); }
  .editor-toolbar button:hover { background: var(--secondary); }
  .editor-toolbar button.active { background: var(--fg); color: var(--bg); }
  .editor-toolbar .et-actions { border-left: var(--rule); padding-left: 8px; margin-left: 4px; }

  /* EDITABLE INLINE */
  .editable { outline: none; min-height: 1em; transition: background var(--duration-fast); border-radius: 2px; }
  .editable:hover { background: hsla(35, 18%, 94%, 0.06); }
  .editable:focus { background: hsla(35, 18%, 94%, 0.1); box-shadow: 0 0 0 2px var(--fg); }
  .editable:empty:before { content: attr(data-placeholder); color: var(--muted-fg); font-style: italic; }

  /* CASE STUDY */
  .case-study { padding: var(--s-10) 0 var(--s-20); min-height: 80vh; }
  .case-container { max-width: 980px; }
  .case-back { background: none; border: 0; color: var(--muted-fg); font-size: var(--t-meta); font-weight: var(--w-medium); text-transform: uppercase; letter-spacing: var(--tr-cap-sm); cursor: pointer; padding: 0; margin-bottom: var(--s-8); transition: color var(--duration-fast); }
  .case-back:hover { color: var(--fg); }
  .case-header { margin-bottom: var(--s-12); }
  .case-meta-edit { display: flex; flex-wrap: wrap; gap: var(--s-4); margin-bottom: var(--s-5); }
  .meta-field { display: flex; flex-direction: column; gap: 4px; }
  .meta-field span { font-size: var(--t-micro); text-transform: uppercase; letter-spacing: var(--tr-cap-sm); color: var(--muted-fg); }
  .meta-field input { background: var(--secondary); border: var(--rule); color: var(--fg); font-family: var(--font-sans); font-size: var(--t-body-sm); padding: 6px 10px; border-radius: 4px; min-width: 140px; }
  .case-meta-display { display: flex; flex-wrap: wrap; gap: 10px; font-size: var(--t-meta); color: var(--muted-fg); text-transform: uppercase; letter-spacing: var(--tr-cap-sm); margin-bottom: var(--s-4); }
  .case-title { font-size: clamp(36px, 6vw, 72px); font-weight: var(--w-light); line-height: var(--lh-tight); letter-spacing: var(--tr-display); }
  .case-blocks { display: flex; flex-direction: column; gap: var(--s-10); }
  .case-add-bottom { margin-top: var(--s-10); display: flex; justify-content: center; }

  /* BLOCK FRAME */
  .block { position: relative; padding-top: 28px; }
  .block-chrome { position: absolute; top: 0; right: 0; display: flex; gap: 4px; opacity: 0.4; transition: opacity var(--duration-fast); }
  .block:hover .block-chrome { opacity: 1; }
  .block-handle { display: inline-flex; align-items: center; padding: 4px 8px; cursor: grab; color: var(--muted-fg); font-size: 14px; user-select: none; }
  .block-btn { background: var(--secondary); color: var(--fg); border: var(--rule); border-radius: 4px; width: 26px; height: 26px; cursor: pointer; font-size: 14px; line-height: 1; display: inline-flex; align-items: center; justify-content: center; }
  .block-btn:hover:not(:disabled) { background: var(--fg); color: var(--bg); }
  .block-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .block-btn-del:hover { background: hsl(0, 60%, 50%); color: white; border-color: hsl(0, 60%, 50%); }

  .block-url-input { width: 100%; background: var(--secondary); border: var(--rule); color: var(--fg); font-family: var(--font-mono, monospace); font-size: var(--t-meta); padding: 6px 10px; margin-top: 8px; border-radius: 4px; }

  .img-cell { display: flex; flex-direction: column; gap: 6px; }
  .img-cell img { width: 100%; display: block; background: var(--muted); }
  .img-empty { aspect-ratio: 16/10; background: var(--muted); border: 1px dashed var(--border); display: flex; align-items: center; justify-content: center; color: var(--muted-fg); font-size: var(--t-meta); text-transform: uppercase; letter-spacing: var(--tr-cap-sm); }
  .img-caption { font-size: var(--t-meta); font-style: italic; color: var(--muted-fg); text-align: center; padding: 4px 0; }

  .col-row { display: grid; gap: var(--s-4); }
  .col-row.col-2 { grid-template-columns: 1fr; }
  .col-row.col-3 { grid-template-columns: 1fr; }
  @media (min-width: 768px) {
    .col-row.col-2 { grid-template-columns: 1fr 1fr; }
    .col-row.col-3 { grid-template-columns: 1fr 1fr 1fr; }
  }

  .case-h2 { font-size: clamp(28px, 4vw, 44px); font-weight: var(--w-light); letter-spacing: var(--tr-display); line-height: var(--lh-tight); }

<script>
// Editor store — single localStorage key, simple subscribe/get/set.
// State shape:
//   { projects: [{ ...projectFields, blocks: [...] }] }
// Block:
//   { id, type, ...fields }
//
// Image-bytes are NEVER stored — only URLs (Drive, Unsplash, etc).

(function () {
  const KEY = "gap.portfolio.v2";
  const uid = () => Math.random().toString(36).slice(2, 9);

  function seed() {
    return {
      projects: (window.PROJECTS || []).map((p) => ({
        ...p,
        blocks: p.blocks && p.blocks.length ? p.blocks : [
          { id: uid(), type: "image", url: p.image, caption: "" },
          { id: uid(), type: "paragraph", text: p.description || "" },
        ],
      })),
    };
  }

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (!raw) return seed();
      const parsed = JSON.parse(raw);
      // Backfill any source projects not yet in saved state (e.g. after data.js update)
      const seedState = seed();
      const have = new Set(parsed.projects.map((p) => p.id));
      seedState.projects.forEach((p) => { if (!have.has(p.id)) parsed.projects.push(p); });
      return parsed;
    } catch (e) {
      return seed();
    }
  }

  let state = load();
  const subs = new Set();
  function emit() { subs.forEach((fn) => fn(state)); }
  function persist() { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) {} }

  const Store = {
    uid,
    get: () => state,
    subscribe(fn) { subs.add(fn); return () => subs.delete(fn); },
    set(updater) {
      state = typeof updater === "function" ? updater(state) : updater;
      persist();
      emit();
    },
    reset() { state = seed(); persist(); emit(); },
    exportJSON() { return JSON.stringify(state, null, 2); },

    // ---- project ops
    updateProject(id, patch) {
      Store.set((s) => ({
        ...s,
        projects: s.projects.map((p) => (p.id === id ? { ...p, ...patch } : p)),
      }));
    },
    addProject() {
      const id = Date.now();
      Store.set((s) => ({
        ...s,
        projects: [
          ...s.projects,
          { id, title: "Untitled Project", category: "Category", year: new Date().getFullYear(), location: "Location", image: "", description: "", behance: "", blocks: [] },
        ],
      }));
      return id;
    },
    deleteProject(id) {
      Store.set((s) => ({ ...s, projects: s.projects.filter((p) => p.id !== id) }));
    },
    reorderProjects(fromIdx, toIdx) {
      Store.set((s) => {
        const arr = s.projects.slice();
        const [m] = arr.splice(fromIdx, 1);
        arr.splice(toIdx, 0, m);
        return { ...s, projects: arr };
      });
    },

    // ---- block ops
    addBlock(projectId, type, atIdx) {
      const defaults = {
        image:     { url: "", caption: "" },
        twocol:    { items: [{ url: "", caption: "" }, { url: "", caption: "" }] },
        threecol:  { items: [{ url: "", caption: "" }, { url: "", caption: "" }, { url: "", caption: "" }] },
        heading:   { text: "Section heading" },
        paragraph: { text: "Write a paragraph…" },
        caption:   { text: "Caption text" },
        quote:     { text: "A pull quote.", attribution: "" },
        divider:   {},
        video:     { url: "", caption: "" },
      };
      const block = { id: uid(), type, ...defaults[type] };
      Store.set((s) => ({
        ...s,
        projects: s.projects.map((p) => {
          if (p.id !== projectId) return p;
          const blocks = p.blocks.slice();
          const i = atIdx == null ? blocks.length : atIdx;
          blocks.splice(i, 0, block);
          return { ...p, blocks };
        }),
      }));
    },
    updateBlock(projectId, blockId, patch) {
      Store.set((s) => ({
        ...s,
        projects: s.projects.map((p) => p.id !== projectId ? p : {
          ...p,
          blocks: p.blocks.map((b) => b.id === blockId ? { ...b, ...patch } : b),
        }),
      }));
    },
    deleteBlock(projectId, blockId) {
      Store.set((s) => ({
        ...s,
        projects: s.projects.map((p) => p.id !== projectId ? p : {
          ...p,
          blocks: p.blocks.filter((b) => b.id !== blockId),
        }),
      }));
    },
    moveBlock(projectId, fromIdx, toIdx) {
      Store.set((s) => ({
        ...s,
        projects: s.projects.map((p) => {
          if (p.id !== projectId) return p;
          const blocks = p.blocks.slice();
          const [m] = blocks.splice(fromIdx, 1);
          blocks.splice(toIdx, 0, m);
          return { ...p, blocks };
        }),
      }));
    },
  };

  window.PortfolioStore = Store;

  // React hook
  window.usePortfolioStore = function () {
    const [s, setS] = React.useState(Store.get());
    React.useEffect(() => Store.subscribe(setS), []);
    return s;
  };
})();

</script>

  const [open, setOpen] = React.useState(false);
  React.useEffect(() => {
    const f = () => setScrolled(window.scrollY > 10);
    window.addEventListener("scroll", f, { passive: true });
    return () => window.removeEventListener("scroll", f);
  }, []);
  const go = (e, id) => { e.preventDefault(); setOpen(false); onNav?.(id); };
  return (
    <header className={"site-header " + (scrolled ? "scrolled" : "")}>
      <div className="header-inner">

        </a>
        <nav>
          <a href="#work" onClick={(e) => go(e, "work")}>Work</a>
          <a href="#about" onClick={(e) => go(e, "about")}>About</a>
          <a href="#contact" onClick={(e) => go(e, "contact")}>Contact</a>

      )}
    </header>
  );
}

function ProjectCard({ project, onOpen }) {
  return (
    <div className="project-card" onClick={() => onOpen(project)}>
      <div className="card-ratio">
        <img src={project.image} alt={project.title} loading="lazy" />
        <div className="card-overlay" />
        <div className="card-text">
          <span className="card-cat">{project.category}</span>
          <h3 className="card-title">{project.title}</h3>
          <p className="card-loc">{project.location}</p>
        </div>
      </div>
    </div>
  );
}
window.ProjectCard = ProjectCard;

function ProjectGrid({ projects, onOpen }) {
  return (
    <div className="uniform-grid">
      {projects.map(p => <ProjectCard key={p.id} project={p} onOpen={onOpen} />)}
    </div>
  );
}
window.ProjectGrid = ProjectGrid;

function ProjectModal({ project, onClose }) {
  React.useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", onKey);
    document.body.style.overflow = project ? "hidden" : "";
    return () => { document.removeEventListener("keydown", onKey); document.body.style.overflow = ""; };
  }, [project, onClose]);

  return (
    <div
      className={"modal-backdrop " + (project ? "open" : "")}
      onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}
    >
      <div className="modal">
        {project && <img className="modal-img" src={project.image} alt={project.title} />}
        <button className="modal-close" onClick={onClose} aria-label="Close">
          <Icon name="close" size={16} />
        </button>
        {project && (
          <div className="modal-body">
            <div className="modal-header">
              <h2 className="modal-title">{project.title}</h2>
              <span className="modal-badge">{project.category}</span>
            </div>
            <div className="modal-meta">
              <span><Icon name="pin" size={16} /><span>{project.location}</span></span>
            </div>
            <p className="modal-desc">{project.description}</p>
          </div>
        )}
      </div>
    </div>
  );
}
window.ProjectModal = ProjectModal;

function AwardsSection({ heading, items, listKey }) {
  const isAdmin = /(?:[?&])edit=880306(?:&|$)/.test(window.location.search);
  const [localItems, setLocalItems] = React.useState(items);

  const update = (i, val) => {
    const next = localItems.map((item, j) => j === i ? { ...item, text: val } : item);
    setLocalItems(next);
    if (listKey) window[listKey] = next;
    window.dispatchEvent(new Event("portfolio_changed"));
  };
  const updateUrl = (i, val) => {
    const next = localItems.map((item, j) => j === i ? { ...item, url: val } : item);
    setLocalItems(next);
    if (listKey) window[listKey] = next;
    window.dispatchEvent(new Event("portfolio_changed"));
  };

  const del = (i) => {
    const next = localItems.filter((_, j) => j !== i);
    setLocalItems(next);
    if (listKey) window[listKey] = next;
    window.dispatchEvent(new Event("portfolio_changed"));
  };

  const add = () => {
    const next = [...localItems, { text: "New entry.", url: "" }];
    setLocalItems(next);
    if (listKey) window[listKey] = next;
    window.dispatchEvent(new Event("portfolio_changed"));
  };

  return (
    <div className="awards-section">
      <h3 className="awards-heading">{heading}</h3>
      <ul className="awards-list">
        {localItems.map((item, i) => {
          const text = typeof item === "string" ? item : item.text;
          const url  = typeof item === "string" ? "" : item.url;
          return (
            <li key={i} style={isAdmin ? {display:"flex", alignItems:"flex-start", gap:6, listStyle:"none"} : {cursor: url ? "pointer" : "default"}}>
              {isAdmin ? (
                <div style={{flex:1, display:"flex", flexDirection:"column", gap:4}}>
                  <div style={{display:"flex", gap:6, alignItems:"flex-start"}}>
                    <span
                      contentEditable
                      suppressContentEditableWarning
                      onBlur={e => update(i, e.currentTarget.textContent)}
                      style={{flex:1, outline:"1px dashed rgba(99,102,241,0.3)", borderRadius:2, padding:"2px 4px", cursor:"text", fontSize:"inherit", lineHeight:"inherit"}}
                    >{text}</span>
                    <button onClick={() => del(i)} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:13,flexShrink:0,lineHeight:1,padding:"2px 4px"}}>✕</button>
                  </div>
                  <input
                    type="text"
                    defaultValue={url}
                    placeholder="Link URL (optional) — e.g. https://example.com"
                    onBlur={e => updateUrl(i, e.currentTarget.value)}
                    style={{fontSize:11,padding:"3px 6px",border:"1px dashed rgba(99,102,241,0.3)",borderRadius:3,background:"transparent",color:"inherit",fontFamily:"inherit",width:"100%"}}
                  />
                </div>
              ) : (
                url
                  ? <a href={url} target="_blank" rel="noopener noreferrer" style={{color:"inherit",textDecoration:"underline",textDecorationColor:"rgba(255,255,255,0.3)",textUnderlineOffset:3,cursor:"pointer"}}>{text}</a>
                  : <span>{text}</span>
              )}
            </li>
          );
        })}
      </ul>
      {isAdmin && (
        <button
          onClick={add}
          style={{fontSize:13,color:"#6366f1",background:"none",border:"1px dashed #6366f1",padding:"4px 12px",borderRadius:4,cursor:"pointer",marginTop:8}}
        >+ Add entry</button>
      )}
    </div>
  );
}

  { type: "threecol",  label: "Three-column row" },
  { type: "heading",   label: "Heading" },
  { type: "paragraph", label: "Paragraph" },
  { type: "caption",   label: "Caption (italic)" },
  { type: "quote",     label: "Pull quote" },
  { type: "divider",   label: "Divider" },
  { type: "video",     label: "Video embed" },
];

// ---------- inline-editable text ----------
function Editable({ value, onChange, tag = "div", placeholder, className, multiline = false, preview }) {
  const ref = React.useRef(null);
  const Tag = tag;
  // Initialize once; avoid resetting cursor on every keystroke
  React.useEffect(() => {
    if (ref.current && ref.current.textContent !== (value || "")) {
      ref.current.textContent = value || "";
    }
  }, [value]);
  if (preview) {
    return <Tag className={className}>{value || ""}</Tag>;
  }
  return (
    <Tag
      ref={ref}
      className={`editable ${className || ""}`}
      contentEditable
      suppressContentEditableWarning
      data-placeholder={placeholder}
      onBlur={(e) => onChange(e.currentTarget.textContent)}
      onKeyDown={(e) => {
        if (!multiline && e.key === "Enter") { e.preventDefault(); e.currentTarget.blur(); }
      }}
    />
  );
}

// ---------- url field ----------
function UrlField({ value, onChange, placeholder = "Paste image URL (Drive, Unsplash, etc)" }) {
  return (
    <input
      className="block-url-input"
      type="url"
      value={value || ""}
      placeholder={placeholder}
      onChange={(e) => onChange(e.target.value)}
    />
  );
}

// ---------- block frame (drag handle + up/down + delete) ----------
function BlockFrame({ index, total, preview, onMoveUp, onMoveDown, onDelete, onDragStart, onDragOver, onDrop, children }) {
  if (preview) return <div className="block">{children}</div>;
  return (
    <div
      className="block"
      draggable
      onDragStart={onDragStart}
      onDragOver={(e) => { e.preventDefault(); onDragOver && onDragOver(e); }}
      onDrop={onDrop}
    >
      <div className="block-chrome">
        <span className="block-handle" title="Drag to reorder">⋮⋮</span>
        <button className="block-btn" onClick={onMoveUp} disabled={index === 0} title="Move up">↑</button>
        <button className="block-btn" onClick={onMoveDown} disabled={index === total - 1} title="Move down">↓</button>
        <button className="block-btn block-btn-del" onClick={onDelete} title="Delete block">×</button>
      </div>
      {children}
    </div>
  );
}

// ---------- image cell (used by image / 2col / 3col) ----------
function ImageCell({ url, caption, onUrl, onCaption, preview }) {
  return (
    <figure className="img-cell">
      {url ? (
        <img src={url} alt={caption || ""} />
      ) : (
        !preview && <div className="img-empty">No image — paste URL below</div>
      )}
      {!preview && <UrlField value={url} onChange={onUrl} />}
      <Editable
        tag="figcaption"
        className="img-caption"
        value={caption}
        onChange={onCaption}
        placeholder="Caption…"
        preview={preview}
      />
    </figure>
  );
}

// ---------- block renderers ----------
function Block({ block, index, total, projectId, preview }) {
  const S = window.PortfolioStore;
  const upd = (patch) => S.updateBlock(projectId, block.id, patch);
  const moveUp = () => S.moveBlock(projectId, index, index - 1);
  const moveDown = () => S.moveBlock(projectId, index, index + 1);
  const del = () => S.deleteBlock(projectId, block.id);

  const drag = {
    onDragStart: (e) => { e.dataTransfer.setData("text/plain", String(index)); e.dataTransfer.effectAllowed = "move"; },
    onDrop: (e) => {
      e.preventDefault();
      const from = parseInt(e.dataTransfer.getData("text/plain"), 10);
      if (!isNaN(from) && from !== index) S.moveBlock(projectId, from, index);
    },
  };

  let body = null;
  if (block.type === "image") {
    body = <ImageCell url={block.url} caption={block.caption}
      onUrl={(v) => upd({ url: v })} onCaption={(v) => upd({ caption: v })} preview={preview} />;
  } else if (block.type === "twocol" || block.type === "threecol") {
    const n = block.type === "twocol" ? 2 : 3;
    body = (
      <div className={`col-row col-${n}`}>
        {block.items.slice(0, n).map((it, i) => (
          <ImageCell key={i} url={it.url} caption={it.caption}
            onUrl={(v) => { const items = block.items.slice(); items[i] = { ...items[i], url: v }; upd({ items }); }}
            onCaption={(v) => { const items = block.items.slice(); items[i] = { ...items[i], caption: v }; upd({ items }); }}
            preview={preview} />
        ))}
      </div>
    );
  } else if (block.type === "heading") {
    body = <Editable tag="h2" className="case-h2" value={block.text} onChange={(v) => upd({ text: v })} placeholder="Heading" preview={preview} />;
  } else if (block.type === "paragraph") {
    body = <Editable tag="p" className="case-p" value={block.text} onChange={(v) => upd({ text: v })} placeholder="Paragraph" multiline preview={preview} />;
  } else if (block.type === "caption") {
    body = <Editable tag="p" className="case-cap" value={block.text} onChange={(v) => upd({ text: v })} placeholder="Caption" preview={preview} />;
  } else if (block.type === "quote") {
    body = (
      <blockquote className="case-quote">
        <Editable tag="p" className="quote-text" value={block.text} onChange={(v) => upd({ text: v })} placeholder="Quote" multiline preview={preview} />
        <Editable tag="cite" className="quote-cite" value={block.attribution} onChange={(v) => upd({ attribution: v })} placeholder="— Attribution" preview={preview} />
      </blockquote>
    );
  } else if (block.type === "divider") {
    body = <hr className="case-hr" />;
  } else if (block.type === "video") {
    body = (
      <div className="video-block">
        {block.url ? (
          <div className="video-frame">
            <iframe src={toEmbedUrl(block.url)} title="Video" allow="autoplay; fullscreen; picture-in-picture" allowFullScreen frameBorder="0"></iframe>
          </div>
        ) : (
          !preview && <div className="img-empty">No video — paste YouTube or Vimeo URL below</div>
        )}
        {!preview && <UrlField value={block.url} onChange={(v) => upd({ url: v })} placeholder="Paste YouTube or Vimeo URL" />}
        <Editable tag="figcaption" className="img-caption" value={block.caption} onChange={(v) => upd({ caption: v })} placeholder="Caption…" preview={preview} />
      </div>
    );
  }

  return (
    <BlockFrame index={index} total={total} preview={preview}
      onMoveUp={moveUp} onMoveDown={moveDown} onDelete={del} {...drag}>
      {body}
    </BlockFrame>
  );
}

function toEmbedUrl(raw) {
  if (!raw) return "";
  try {
    const u = new URL(raw);
    if (u.hostname.includes("youtube.com")) {
      const id = u.searchParams.get("v"); if (id) return `https://www.youtube.com/embed/${id}`;
    }
    if (u.hostname === "youtu.be") {
      return `https://www.youtube.com/embed/${u.pathname.slice(1)}`;
    }
    if (u.hostname.includes("vimeo.com")) {
      return `https://player.vimeo.com/video/${u.pathname.slice(1)}`;
    }
  } catch (e) {}
  return raw;
}

function AddBlockMenu({ projectId, atIdx }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    const close = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    if (open) document.addEventListener("mousedown", close);
    return () => document.removeEventListener("mousedown", close);
  }, [open]);
  return (
    <div className="add-block-wrap" ref={ref}>
      <button className="add-block-btn" onClick={() => setOpen((v) => !v)}>+ Add block</button>
      {open && (
        <div className="add-block-menu">
          {BLOCK_TYPES.map((b) => (
            <button key={b.type} onClick={() => { window.PortfolioStore.addBlock(projectId, b.type, atIdx); setOpen(false); }}>
              {b.label}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

  const state = window.usePortfolioStore();
  const projects = state.projects;
  const S = window.PortfolioStore;
  const [dragIdx, setDragIdx] = React.useState(null);

  if (preview) {
    return (
      <div className="uniform-grid">
        {projects.map((p) => (
          <div key={p.id} className="project-card"
            onClick={() => p.behance ? window.open(p.behance, "_blank", "noopener,noreferrer") : onOpen(p.id)}>
            <div className="card-ratio">
              {p.image && <img src={p.image} alt={p.title} />}
              <div className="card-overlay" />
            </div>
            <div className="card-text">
              <div className="card-cat">{p.category}</div>
              <h3 className="card-title">{p.title}</h3>
              <div className="card-loc">
                {p.location}
                {p.behance && <span style={{marginLeft:"8px",opacity:0.7,fontSize:"16px"}}>↗</span>}

            onDragEnd={() => setDragIdx(null)}

              if (dragIdx != null && dragIdx !== i) S.reorderProjects(dragIdx, i);
              setDragIdx(null);

              {p.image
                ? <img src={p.image} alt={p.title} />

            </div>
            <div className="grid-edit-fields">
              <input className="ge-cat" value={p.category} placeholder="Category"
                onChange={(e) => S.updateProject(p.id, { category: e.target.value })} />
              <input className="ge-title" value={p.title} placeholder="Project title"
                onChange={(e) => S.updateProject(p.id, { title: e.target.value })} />
              <input className="ge-loc" value={p.location} placeholder="Location"
                onChange={(e) => S.updateProject(p.id, { location: e.target.value })} />
              <input className="ge-url" value={p.image || ""} placeholder="Cover image URL"
                onChange={(e) => S.updateProject(p.id, { image: e.target.value })} />
              <input className="ge-url" value={p.behance || ""} placeholder="Behance URL (optional)"
                onChange={(e) => S.updateProject(p.id, { behance: e.target.value })} />

                <button className="ge-del" onClick={() => {
                  if (confirm(`Delete "${p.title}"?`)) S.deleteProject(p.id);

            </div>
          </div>
        ))}

      <div className="grid-add-row">
        <button className="grid-add-btn" onClick={() => {
          const id = S.addProject();
          onOpen(id);
        }}>+ Add project</button>
      </div>
    </>
  );
}

function EditorToolbar({ mode, setMode }) {
  const onExport = () => {
    const blob = new Blob([window.PortfolioStore.exportJSON()], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "portfolio.json"; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };
  const onReset = () => {
    if (confirm("Reset everything to defaults? Your edits will be lost.")) window.PortfolioStore.reset();
  };
  const [hasChanges, setHasChanges] = React.useState(false);
  const onSave = () => {
    try {
      const data = {
        projects: window.PortfolioStore ? window.PortfolioStore.get().projects : [],
        awards: window.AWARDS || [],
        features: window.FEATURES || [],
        bioPara: window.BIO_PARAS || [],
        aboutPhoto: window.ABOUT_PHOTO || null,
      };
      localStorage.setItem("portfolio_save", JSON.stringify(data));
      setHasChanges(false);
      alert("Saved! Your changes are stored in this browser.");
    } catch(e) {
      alert("Save failed: " + e.message);
    }
  };
  React.useEffect(() => {
    const handler = () => setHasChanges(true);
    window.addEventListener("portfolio_changed", handler);
    return () => window.removeEventListener("portfolio_changed", handler);
  }, []);
  const onDownloadHTML = async () => {
    try {
      const resp = await fetch(window.location.href);
      let src = await resp.text();
      // Update AWARDS
      if (window.AWARDS) {
        const awardsJSON = JSON.stringify(window.AWARDS, null, 2);
        src = src.replace(/window\.AWARDS = \[[\s\S]*?\];/, "window.AWARDS = " + awardsJSON + ";");
      }
      // Update FEATURES
      if (window.FEATURES) {
        const featJSON = JSON.stringify(window.FEATURES, null, 2);
        src = src.replace(/window\.FEATURES = \[[\s\S]*?\];/, "window.FEATURES = " + featJSON + ";");
      }
      // Update BIO_PARAS
      if (window.BIO_PARAS) {
        const bioJSON = JSON.stringify(window.BIO_PARAS, null, 2);
        src = src.replace(/window\.BIO_PARAS = \[[\s\S]*?\];/, "window.BIO_PARAS = " + bioJSON + ";");
      }
      // Update ABOUT_PHOTO
      if (window.ABOUT_PHOTO) {
        src = src.replace(/window\.ABOUT_PHOTO = null;/, 'window.ABOUT_PHOTO = "' + window.ABOUT_PHOTO + '";');
        // Replace the default base64 photo in About component src= with new photo
        src = src.replace(/const \[photoSrc, setPhotoSrc\] = React\.useState\(window\.ABOUT_PHOTO \|\| "data:[^"]*"\)/,
          'const [photoSrc, setPhotoSrc] = React.useState(window.ABOUT_PHOTO || "' + window.ABOUT_PHOTO + '")');
      }
      const blob = new Blob([src], { type: "text/html" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "index.html";
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    } catch (e) {
      alert("Could not fetch page source. Make sure you are viewing this from a server (not file://). Error: " + e.message);
    }
  };
  return (
    <div className="editor-toolbar">
      <div className="et-modes">
        <button className={mode === "edit" ? "active" : ""} onClick={() => setMode("edit")}>Edit</button>
        <button className={mode === "preview" ? "active" : ""} onClick={() => setMode("preview")}>Preview</button>
      </div>
      <div className="et-actions">
        <button onClick={onDownloadHTML} title="Download complete HTML file">Download HTML</button>
        <button onClick={onExport} title="Download current state as JSON">Export</button>
        <button onClick={onSave} title="Save changes to localStorage" style={{fontWeight: hasChanges ? 600 : "inherit", background: hasChanges ? "var(--fg)" : "transparent", color: hasChanges ? "var(--bg)" : "inherit"}}>Save</button>
        <button onClick={onReset} title="Reset to seeded data">Reset</button>
      </div>
    </div>
  );
}
window.EditorToolbar = EditorToolbar;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // Hide the toggle until the host has actually enabled the rail (the
  // __omelette_rail_enabled window message, posted only when the
  // omelette_deck_rail_enabled flag is on for this user). The initial read
  // covers TweaksPanel mounting after the message already arrived; the
  // listener covers the common case of mounting first.
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});


const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "showWork": true,
  "showAbout": true,
  "showAwards": true,
  "showFooter": true,
  "dark": true
} /*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const isAdmin = (typeof window !== "undefined") && /(?:[?&])edit=880306(?:&|$)/.test(window.location.search);
  const [mode, setMode] = React.useState(isAdmin ? "edit" : "preview");
  const [openId, setOpenId] = React.useState(null);
  const preview = mode === "preview";

  React.useEffect(() => {
    document.body.classList.toggle("dark", !!t.dark);
  }, [t.dark]);
  const onNav = (id) => {
    if (openId) { setOpenId(null); setTimeout(() => { const el = document.getElementById(id); if (el) el.scrollIntoView({ behavior: "smooth" }); }, 50); return; }
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
  };

  return (
    <>
      {isAdmin && <EditorToolbar mode={mode} setMode={setMode} />}
      <Header onNav={onNav} />
      {openId ? (
        <ProjectDetail projectId={openId} preview={preview} onBack={() => setOpenId(null)} />
      ) : (
        <>
          {t.showWork &&
            <section id="work" className="section-work">
              <div className="container">
                <EditableGrid onOpen={setOpenId} preview={preview} />
              </div>
            </section>
          }
          {(t.showAbout || t.showAwards) &&
            <section id="about" className="section-about" style={{ backgroundColor: "rgb(0, 0, 0)" }}>
              <div className="container">
                {t.showAbout && <About />}
                {t.showAwards && <Awards />}
              </div>
            </section>
          }
          {t.showFooter && <Footer />}
        </>
      )}
      <TweaksPanel title="Tweaks">
        <TweakSection title="Sections — toggle off to delete">
          <TweakToggle label="Work grid" value={t.showWork} onChange={(v) => setTweak("showWork", v)} />
          <TweakToggle label="About" value={t.showAbout} onChange={(v) => setTweak("showAbout", v)} />
          <TweakToggle label="Awards" value={t.showAwards} onChange={(v) => setTweak("showAwards", v)} />
          <TweakToggle label="Footer" value={t.showFooter} onChange={(v) => setTweak("showFooter", v)} />
        </TweakSection>
        <TweakSection title="Theme">
          <TweakToggle label="Dark mode" value={t.dark} onChange={(v) => setTweak("dark", v)} />
        </TweakSection>
      </TweaksPanel>
    </>);

}
ReactDOM.createRoot(document.getElementById("app")).render(<App />);

</script>
